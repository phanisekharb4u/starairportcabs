<script>
    function sendToWhatsApp(e) {
        e.preventDefault();
        
        const name       = document.getElementById('name').value.trim();
        const phone      = document.getElementById('phone').value.trim();
        const pickup     = document.getElementById('pickup').value.trim();
        const dropoff    = document.getElementById('dropoff').value.trim();
        const date       = document.getElementById('date').value;
        const time       = document.getElementById('time').value;
        const passengers = document.getElementById('passengers').value;

        if (!name || !phone || !pickup || !dropoff || !date || !time || !passengers) {
            alert("Please fill all fields");
            return;
        }

        // Updated message format
        const message = 
`Hi Mano, I want to book cab services

*Customer Name:* ${name}
*Phone:* ${phone}
*Pickup:* ${pickup}
*Drop-off:* ${dropoff}
*Date:* ${date}
*Time:* ${time}
*Passengers:* ${passengers}

Please confirm availability, price and send the quote. Thank you! 🚖`;

        // Your WhatsApp number
        const yourWhatsAppNumber = "447436954611";

        const encodedMessage = encodeURIComponent(message);
        const whatsappURL = `https://wa.me/${yourWhatsAppNumber}?text=${encodedMessage}`;

        // Open WhatsApp
        window.open(whatsappURL, '_blank');
        
        // Show success feedback
        const btn = document.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '✅ Sent! Check WhatsApp';
        btn.style.backgroundColor = '#15803d';
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.backgroundColor = '';
            document.getElementById('bookingForm').reset();
        }, 3000);
    }

    // Attach the submit handler
    document.getElementById('bookingForm').addEventListener('submit', sendToWhatsApp);

    // Set default date to tomorrow
    const today = new Date();
    today.setDate(today.getDate() + 1);
    const dateInput = document.getElementById('date');
    dateInput.value = today.toISOString().split('T')[0];
    dateInput.min = today.toISOString().split('T')[0];
</script>
